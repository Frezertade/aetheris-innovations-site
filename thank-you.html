<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Aetheris Online Presence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,30..100,0..1;1,9..144,300..700,30..100,0..1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', sans-serif;
      background: #fafaf9;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 520px; }
    .check {
      width: 64px; height: 64px;
      background: #2d7d46;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
    }
    h1 { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    p { color: #555; line-height: 1.7; margin-bottom: 1.5rem; }
    .cta {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .cta:hover { background: #333; }
    .secondary {
      display: block;
      margin-top: 1rem;
      color: #666;
      font-size: 0.85rem;
    }
    .secondary a { color: #1a1a1a; }
  </style>
  <link rel="stylesheet" href="/aetheris-ui.css">
</head>
<body>
  <div class="container">
    <div class="check">✓</div>
    <h1>Payment received.</h1>
    <p>Your project is confirmed and we're starting the build. You'll receive a welcome email within 15 minutes with next steps and your kickoff timeline.</p>
    <a href="mailto:hello@aetherisinnovations.com" class="cta">Email us if you have questions</a>
    <span class="secondary">or go back to <a href="/">aetherisinnovations.com</a></span>
  </div>
</body>
</html>
